name: Continuous Integration

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  build-release:
    name: Release Build (Java 21 canonical)
    runs-on: ubuntu-latest
    outputs:
      dist-files: ${{ steps.collect-dist-files.outputs.files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Release Build
        run: ./gradlew --no-daemon clean build runbundles

      - name: Ensure dist files exist
        run: |
          test -d dist
          find dist -type f | head -n 1 > /dev/null

      - name: Upload dist bundle (internal)
        uses: actions/upload-artifact@v4
        with:
          name: dist-bundle
          path: dist/**
          if-no-files-found: error

      - name: Collect dist file list
        id: collect-dist-files
        shell: bash
        run: |
          files_json=$(find dist -type f | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "files=${files_json}" >> "$GITHUB_OUTPUT"

  upload-dist-files:
    name: Upload dist files
    runs-on: ubuntu-latest
    needs: build-release
    if: ${{ needs.build-release.outputs.dist-files != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.build-release.outputs.dist-files) }}

    steps:
      - name: Download dist bundle
        uses: actions/download-artifact@v4
        with:
          name: dist-bundle
          path: .

      - name: Compute artifact name
        id: artifact-name
        shell: bash
        run: |
          file="${{ matrix.file }}"
          rel="${file#dist/}"
          name="dist-${rel}"
          name="${name//\//__}"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Upload ${{ matrix.file }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: ${{ matrix.file }}
          if-no-files-found: error

  build-java25:
    name: Build Verification (Java 25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build (no artifact upload)
        run: ./gradlew --no-daemon clean build
