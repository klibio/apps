name: Continuous Integration

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  set-timestamp:
    name: Set Timestamp
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.timestamp.outputs.timestamp }}

    steps:
      - name: Set Timestamp
        id: timestamp
        run: echo "timestamp=$(date +"%Y%m%d%H%M%S")" >> "$GITHUB_OUTPUT"

  build-release:
    name: Release Build (Java 21 canonical)
    runs-on: ubuntu-latest
    needs: set-timestamp
    outputs:
      dist-files: ${{ steps.collect-dist-files.outputs.files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Release Build
        env:
          SONATYPE_BEARER: ${{ secrets.sonatype_bearer }}
        run: |
          ./gradlew --version
          ./gradlew --no-daemon clean release

      - name: Collect dist file list
        id: collect-dist-files
        shell: bash
        run: |
          files_json=$(find ./dist/bundles -type f -name "*.jar" ! -name "*-javadoc*.jar" ! -name "*-sources*.jar" | sort | jq -R -s -c 'split("\n")[:-1]')
          echo "files=${files_json}" >> "$GITHUB_OUTPUT"
          echo -e "\n#\n# Collected canonical dist files:\n#\n"
          if [ "${files_json}" = "[]" ]; then
            echo "  - none"
          else
            echo "$files_json" | jq -r '.[]' | while read file; do
              echo "  - $file"
            done
          fi

      - name: Upload dist bundle (internal)
        uses: actions/upload-artifact@v4
        with:
          name: dist-bundle-${{ github.event.repository.name }}-${{ needs.set-timestamp.outputs.timestamp }}
          path: |
            ./dist/bundles/**/*.jar
            !./dist/bundles/**/*-javadoc*.jar
            !./dist/bundles/**/*-sources*.jar
          if-no-files-found: error

  upload-dist-files:
    name: Upload canonical dist files
    runs-on: ubuntu-latest
    needs:
      - set-timestamp
      - build-release
    if: ${{ needs.build-release.outputs.dist-files != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.build-release.outputs.dist-files) }}

    steps:
      - name: Download dist bundle
        uses: actions/download-artifact@v4
        with:
          name: dist-bundle-${{ github.event.repository.name }}-${{ needs.set-timestamp.outputs.timestamp }}
          path: .

      - name: Compute artifact name
        id: artifact-name
        shell: bash
        run: |
          file="${{ matrix.file }}"
          name="$(basename "${file}")"
          timestamp="${{ needs.set-timestamp.outputs.timestamp }}"
          echo "name=${name%.jar}-${timestamp}" >> "$GITHUB_OUTPUT"

      - name: Upload ${{ matrix.file }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: ${{ matrix.file }}
          if-no-files-found: error

  build-java25:
    name: Build Verification (Java 25)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Build (no artifact upload)
        run: ./gradlew --no-daemon clean build
